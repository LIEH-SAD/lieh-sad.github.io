<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="文章详情 - LIEH SAD 个人博客">
    <meta name="author" content="LIEH SAD">
    <title>文章 - LIEH SAD | 个人博客</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <!-- 防止页面闪烁 -->
    <script>
        (function() {
            var mode = localStorage.getItem('theme-mode') || 'auto';
            var theme;
            if (mode === 'auto') {
                theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            } else {
                theme = mode;
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <header class="header" id="header">
        <nav class="nav container">
            <a href="index.html" class="nav__logo">
                <span class="nav__logo-icon">&lt;/&gt;</span>
                <span class="nav__logo-text">Lieh<span class="highlight">Sad</span></span>
            </a>

            <div class="nav__menu" id="nav-menu">
                <ul class="nav__list">
                    <li class="nav__item">
                        <a href="index.html#home" class="nav__link">首页</a>
                    </li>
                    <li class="nav__item">
                        <a href="index.html#blog" class="nav__link active-link">文章</a>
                    </li>
                    <li class="nav__item">
                        <a href="index.html#categories" class="nav__link">分类</a>
                    </li>
                    <li class="nav__item">
                        <a href="index.html#about" class="nav__link">关于</a>
                    </li>
                    <li class="nav__item">
                        <a href="index.html#contact" class="nav__link">联系</a>
                    </li>
                </ul>

                <div class="nav__actions">
                    <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="nav__close" id="nav-close">
                        <i class="fas fa-times"></i>
                    </div>
                </div>
            </div>

            <div class="nav__toggle" id="nav-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <main class="main">
        <!-- 文章头部 Banner -->
        <section class="article-hero section" id="article-hero">
            <div class="container">
                <div class="article-hero__content">
                    <a href="index.html#blog" class="article-hero__back">
                        <i class="fas fa-arrow-left"></i>
                        返回文章列表
                    </a>
                    <div class="article-hero__meta" id="article-meta">
                        <span class="blog__card-category" id="article-category"></span>
                        <span class="article-hero__date" id="article-date">
                            <i class="far fa-calendar-alt"></i>
                        </span>
                        <span class="article-hero__readtime" id="article-readtime">
                            <i class="far fa-clock"></i>
                        </span>
                    </div>
                    <h1 class="article-hero__title" id="article-title"></h1>
                </div>
            </div>
        </section>

        <!-- 文章内容 -->
        <section class="article-content section">
            <div class="container">
                <div class="article-content__wrapper">
                    <article class="article-content__body" id="article-body">
                        <!-- 文章内容由 JavaScript 动态加载 -->
                    </article>

                    <!-- 文章导航（上下篇） -->
                    <nav class="article-nav" id="article-nav">
                        <a class="article-nav__link article-nav__link--prev" id="article-prev">
                            <div class="article-nav__direction">
                                <i class="fas fa-arrow-left"></i>
                                上一篇
                            </div>
                            <span class="article-nav__title" id="article-prev-title"></span>
                        </a>
                        <a class="article-nav__link article-nav__link--next" id="article-next">
                            <div class="article-nav__direction">
                                下一篇
                                <i class="fas fa-arrow-right"></i>
                            </div>
                            <span class="article-nav__title" id="article-next-title"></span>
                        </a>
                    </nav>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer__content">
                <div class="footer__brand">
                    <a href="index.html" class="nav__logo">
                        <span class="nav__logo-icon">&lt;/&gt;</span>
                        <span class="nav__logo-text">Lieh<span class="highlight">Sad</span></span>
                    </a>
                    <p class="footer__description">
                        用文字记录成长，用代码改变世界。
                    </p>
                </div>
                <div class="footer__links">
                    <div class="footer__links-group">
                        <h4 class="footer__links-title">快速链接</h4>
                        <a href="index.html#home">首页</a>
                        <a href="index.html#blog">文章</a>
                        <a href="index.html#categories">分类</a>
                        <a href="index.html#about">关于</a>
                    </div>
                    <div class="footer__links-group">
                        <h4 class="footer__links-title">分类</h4>
                        <a href="index.html" data-filter="tech">技术</a>
                        <a href="index.html" data-filter="life">生活</a>
                        <a href="index.html" data-filter="tutorial">教程</a>
                        <a href="index.html" data-filter="notes">随笔</a>
                    </div>
                    <div class="footer__links-group">
                        <h4 class="footer__links-title">关注我</h4>
                        <div class="footer__social">
                            <a href="https://github.com/lieh-sad" target="_blank" rel="noopener noreferrer" class="footer__social-link"><i class="fab fa-github"></i></a>
                            <a href="https://space.bilibili.com/1336760259" target="_blank" rel="noopener noreferrer" class="footer__social-link"><i class="fab fa-bilibili"></i></a>
                            <a href="https://www.mtrbbs.top/space-uid-1289.html" target="_blank" rel="noopener noreferrer" class="footer__social-link"><i class="fa-solid fa-train"></i></a>
                            <a href="https://lieh-sad.github.io/nanbin/" target="_blank" rel="noopener noreferrer" class="footer__social-link"><i class="fa-solid fa-globe"></i></a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="footer__bottom">
                <p>&copy; 2026 Lieh Sad. All rights reserved.</p>
                <p>Built with <i class="fas fa-heart" style="color: var(--primary-color);"></i> and vanilla code</p>
            </div>
        </div>
    </footer>

    <!-- 回到顶部 -->
    <a href="#" class="scrollup" id="scroll-up">
        <i class="fas fa-arrow-up"></i>
    </a>

    <script src="js/main.js"></script>
</body>
</html>
